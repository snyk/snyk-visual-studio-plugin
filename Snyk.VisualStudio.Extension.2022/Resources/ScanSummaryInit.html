<!DOCTYPE html>
<html>
<head>
  <meta http-equiv='Content-Type' content='text/html; charset=unicode' />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="style-src 'self' 'nonce-${nonce}' 'nonce-ideNonce';
        script-src 'nonce-${nonce}';
        font-src 'self';" />
  <style nonce=${nonce}>
    :root {
      --default-font: var(--vscode-font-family, "SF Pro Text", "Segoe UI", "Ubuntu", Geneva, Verdana, Tahoma, sans-serif);
      --ide-background-color: var(--vscode-sideBar-background);
      --text-color: var(--vscode-foreground);
      --input-border: var(--vscode-input-border);
    }
    body { background-color: var(--ide-background-color); color: var(--text-color); font-family: var(--default-font); font-size: var(--vscode-font-size, 13px); }
    p { margin: 0.4rem 0; }
    hr { margin: 1rem 0; }

    .snx-loader { flex: none; display: inline-block; width: 10px; height: 10px; border: 2px solid rgba(125,125,125,.65); border-bottom-color: transparent; border-radius: 50%; margin-right: 0.5rem; animation: spin 1s linear infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .snx-h1 { font-weight: 400; margin: 0.4rem 0; }
    .snx-status { display: flex; align-items: center; padding: 0.3rem 0.8rem; background-color: rgba(255,255,255,.1); border-radius: 0.5rem; }
    .snx-header { display: flex; gap: 0.8rem; }
    .snx-status .snx-message { display: flex; align-items: center; }
  </style>
  ${ideStyle}
</head>
<body>
  <div class="snx-summary">
    <div class="snx-status">
      <span class="snx-loader"></span>
      <p class="snx-message">Snyk Security is loading...</p>
    </div>
  </div>
</body>
</html>
